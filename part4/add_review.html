<!DOCTYPE html>
<html lang='en'>
<head>
        <meta charset="UTF-8">
        <meta name="viewport" content ="width=device-width, initial-scale=1.0">
        <title> HBnB Add Review </title>
        <link rel="stylesheet" href="styles.css">
        <link rel="icon" href="Hbnbicon.png" type="image/png">
</head>
<body>
        <header>
                <nav class="navbar">
                        <a href="index.html">
                                <img src="Hbnblogo.png" alt="HBnB Logo" class="logo">
                        </a>
                        <div class="nav-links">
                                <a href="index.html">Home</a>
                                <a href="login.html" id="login-link" class="login-button">Login</a>
                        </div>
                </nav>
        </header>

        <main>
		<form id="review-form" class="form">
			<label for="rating">Rating</label>
			<select id="rating" required>
				<option value="">Select rating</option>
				<option value="1">1 - Poor</option>
				<option value="2">2 - Fair</option>
				<option value="3">3 - Good</option>
				<option value="4">4 - Very Good</option>
				<option value="5">5 - Excellent</option>
			</select>

			<label for="review-text">Your Review</label>
			<textarea id="review-text" rows="5" required></textarea>

			<button type="submit">Submit Review</button>
			<p id="error-message"></p>
		</form>
	</main>

	<footer>
		<p>&copy; 2026 HBnB. All rights reserved.</p>
	</footer>

	<script src="scripts.js"></script>
</body>
</html>
