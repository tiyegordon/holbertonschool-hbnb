<!DOCTYPE html>
<html lang='en'>
<head>
        <meta charset="UTF-8">
        <meta name="viewport" content ="width=device-width, initial-scale=1.0">
        <title> HBnB Login </title>
        <link rel="stylesheet" href="styles.css">
        <link rel="icon" href="Hbnbicon.png" type="image/png">
</head>
<body>
        <header>
                <nav class="navbar">
                        <a href="index.html">
                                <img src="Hbnblogo.png" alt="HBnB Logo" class="logo">
                        </a>
                        <div class="nav-links">
                                <a href="index.html">Home</a>
                                <a href="login.html" id="login-link" class="login-button">Login</a>
                        </div>
                </nav>
        </header>

        <main>
		<form id="login-form">
			<label for="email">Email</label>
			<input type="email" id="email" required>

			<label for="password">Password</label>
			<input type="password" id="password" required>

			<button type="submit">Sign In</button>
			<p id="error-message"></p>
		</form>
	</main>
	
	<footer>
		<p>&copy; 2026 HBnB. All rights reserved.</p>
	</footer>

	<script src="scripts.js"></script>
</body>
</html>
